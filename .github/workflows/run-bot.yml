name: VI Fancy Number Scraper

on:
  schedule:
    # Run once every hour
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allow manual triggering from the GitHub Actions tab
    inputs:
      max_cycles:
        description: 'Number of search cycles to run'
        required: true
        default: '30'

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Install Playwright Chromium
      run: npx playwright install chromium --with-deps

    - name: Run Crawler Bot
      env:
        GOOGLE_APPS_SCRIPT_URL: ${{ secrets.GOOGLE_APPS_SCRIPT_URL }}
        PINCODE: ${{ secrets.PINCODE }}
        MOBILE: ${{ secrets.MOBILE }}
        FULLNAME: ${{ secrets.FULLNAME }}
      run: |
        # Use manually provided max_cycles if triggered manually, otherwise default to 30
        MAX_CYCLES="${{ github.event.inputs.max_cycles || '30' }}"
        node vi-number-bot-one-worker.js --headless --max-cycles=$MAX_CYCLES
